name: DevSecOps Canary CD Pipeline

on:
  push:
    branches: [ main, feature-v2 ]
    paths:
      - 'app/*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:${{ github.sha }} .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:${{ github.sha }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Connect to EKS Cluster
      run: |
        aws eks update-kubeconfig --name devops-college-project --region us-east-1

    - name: Deploy Canary Pod (10% Traffic)
      run: |
        sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:${{ github.sha }}|g" k8s/canary-deployment.yaml
        kubectl apply -f k8s/canary-deployment.yaml
        kubectl apply -f k8s/ingress.yaml

    - name: Continuous Verification Phase (The Intelligent Rollback)
      run: |
        echo "Monitoring canary health..."
        sleep 20 
        
        # Simulating automated checks against the canary route
        STATUS=$(kubectl exec deploy/app-stable -- curl -s -o /dev/null -w "%{http_code}" http://app-canary-svc/health || echo "failed")
        echo "Canary Health Check Status Code: $STATUS"
        
        if [ "$STATUS" != "200" ]; then
          echo "🚨 FAULTY BUILD DETECTED! INITIATING AUTOMATED ROLLBACK..."
          kubectl delete -f k8s/canary-deployment.yaml
          kubectl delete -f k8s/ingress.yaml
          exit 1
        fi

    - name: Promote Canary to Stable Production (100% Traffic)
      if: success()
      run: |
        sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:${{ github.sha }}|g" k8s/stable-deployment.yaml
        kubectl apply -f k8s/stable-deployment.yaml
