apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-canary
  labels:
    app: my-web-app
    tier: testing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-web-app
      version: canary
  template:
    metadata:
      labels:
        app: my-web-app
        version: canary
    spec:
      containers:
      - name: web-app-canary-container
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: app-canary-svc
spec:
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: my-web-app
    version: canary
