# Global configuration options
global:
  # The StorageClass to use for persistent volumes (e.g. "gp3" on AWS EKS).
  # If empty or null, the Kubernetes cluster's default StorageClass is used.
  storageClass: ""

# Grafana Visualization configuration
grafana:
  replicaCount: 1
  image:
    repository: "grafana/grafana"
    tag: "10.4.2"
    pullPolicy: "IfNotPresent"
  service:
    type: "LoadBalancer"
    port: 80
    targetPort: 3000

# Grafana Alloy Telemetry Agent configuration
alloy:
  replicaCount: 1
  image:
    repository: "grafana/alloy"
    tag: "v1.1.0"
    pullPolicy: "IfNotPresent"
  service:
    type: "ClusterIP"
    port: 12345

# Loki logs database configuration
loki:
  image:
    repository: "grafana/loki"
    tag: "2.9.8"
    pullPolicy: "IfNotPresent"
  persistence:
    enabled: true
    size: "10Gi"

# Mimir metrics database configuration
mimir:
  image:
    repository: "grafana/mimir"
    tag: "2.12.0"
    pullPolicy: "IfNotPresent"
  persistence:
    enabled: true
    size: "10Gi"

# Tempo traces database configuration
tempo:
  image:
    repository: "grafana/tempo"
    tag: "2.4.1"
    pullPolicy: "IfNotPresent"
  persistence:
    enabled: true
    size: "10Gi"
