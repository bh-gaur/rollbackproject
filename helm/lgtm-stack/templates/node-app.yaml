apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
  labels:
    app: node-app
    {{- include "lgtm-stack.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.nodeApp.replicaCount }}
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      annotations:
        # Allow Alloy to discover and scrape /metrics in Kubernetes
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.nodeApp.service.port }}"
        prometheus.io/path: "/metrics"
      labels:
        app: node-app
        {{- include "lgtm-stack.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: node-app
          image: "{{ .Values.nodeApp.image.repository }}:{{ .Values.nodeApp.image.tag }}"
          imagePullPolicy: {{ .Values.nodeApp.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.nodeApp.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: "{{ .Values.nodeApp.service.port }}"
            - name: OTEL_SERVICE_NAME
              value: "node-app"
            - name: OTEL_METRICS_EXEMPLAR_FILTER
              value: "always_on"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy:4318"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: node-app
  labels:
    app: node-app
    {{- include "lgtm-stack.labels" . | nindent 4 }}
spec:
  type: {{ .Values.nodeApp.service.type }}
  ports:
    - port: {{ .Values.nodeApp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: node-app
    {{- include "lgtm-stack.selectorLabels" . | nindent 4 }}
